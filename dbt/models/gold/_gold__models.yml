version: 2

models:
  - name: dim_partida
    description: >
      Dimensão de partida (view): match_id, evento, fase, mapa. Centraliza
      a extração de evento/fase/mapa para as views `_por_fase`/`_por_evento`/
      `_por_mapa` não duplicarem a lógica.
    columns:
      - name: match_id
        description: "{{ doc('col_match_id') }}"
        tests:
          - not_null
          - unique
      - name: evento
        description: "{{ doc('col_evento') }}"
      - name: fase
        description: "{{ doc('col_fase') }}"
      - name: mapa
        description: "{{ doc('col_mapa') }}"

  - name: combate_jogador_partida
    description: >
      Fato de combate, grão jogador × partida: kills, headshots, mortes,
      assistências, team_kills, dano causado/recebido. Roster completo via
      LEFT JOIN em silver.ticks — garante linha mesmo para quem ficou com
      stat zerada. `kills`/`headshots` excluem team-kills (mesmo critério da
      HLTV — matar companheiro não conta como "kill"); `mortes` conta
      qualquer morte real, inclusive por companheiro ou pela bomba.
    columns:
      - name: match_id
        description: "{{ doc('col_match_id') }}"
        tests:
          - not_null
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
        tests:
          - not_null
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: kills
        description: "Total de abates do jogador na partida, excluindo team-kills (fogo amigo)."
      - name: headshots
        description: "Total de abates com headshot do jogador na partida, excluindo team-kills."
      - name: hs_pct
        description: "`headshots / kills`. `NULL` quando `kills = 0` (\"sem kills\" é diferente de \"0% de headshot\")."
      - name: mortes
        description: "Total de vezes que o jogador morreu na partida (inclui morte por companheiro ou pela bomba)."
      - name: assistencias
        description: "Total de assistências do jogador na partida."
      - name: team_kills
        description: "Total de vezes que o jogador matou um companheiro de time (fogo amigo) na partida."
      - name: dano_causado
        description: "Soma de `dmg_health_real` causado pelo jogador na partida (dano efetivo, não o bruto)."
      - name: dano_recebido
        description: "Soma de `dmg_health_real` recebido pelo jogador na partida (dano efetivo, não o bruto)."
      - name: _camada
        description: "{{ doc('col_camada') }}"
      - name: _gerado_em
        description: "{{ doc('col_gerado_em') }}"

  - name: granadas_jogador_partida
    description: >
      Fato de granadas, grão jogador × partida × categoria de granada.
      Deduplica granada física pela chave (entity_id, round_num,
      thrower_steamid, categoria_granada) — entity_id sozinho é reciclado
      dentro da mesma partida e conta errado.
    columns:
      - name: match_id
        description: "{{ doc('col_match_id') }}"
        tests:
          - not_null
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
        tests:
          - not_null
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: categoria_granada
        description: "Categoria normalizada da granada: `HE`, `Flash`, `Smoke`, `Molotov`, `Incendiary` ou `Decoy` (a partir do `grenade_type` cru do engine)."
      - name: granadas_lancadas
        description: "Quantidade de granadas físicas dessa categoria lançadas pelo jogador na partida."
      - name: _camada
        description: "{{ doc('col_camada') }}"
      - name: _gerado_em
        description: "{{ doc('col_gerado_em') }}"

  - name: posicionamento_jogador_partida
    description: >
      Fato de posicionamento, grão jogador × partida × área do mapa
      (callout): quantos ticks e segundos o jogador passou em cada local.
    columns:
      - name: match_id
        description: "{{ doc('col_match_id') }}"
        tests:
          - not_null
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
        tests:
          - not_null
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: place
        description: "{{ doc('col_participante_place') }}"
      - name: qtd_ticks
        description: "Quantidade de ticks capturados em que o jogador estava nesse local."
      - name: segundos_no_local
        description: "`qtd_ticks / taxa_de_tick` da partida — tempo em segundos que o jogador passou nesse local."
      - name: _camada
        description: "{{ doc('col_camada') }}"
      - name: _gerado_em
        description: "{{ doc('col_gerado_em') }}"

  - name: bomba_jogador_partida
    description: >
      Fato de bomba, grão jogador × partida: só `plants` por jogador.
      Defuses não são atribuídos a um jogador aqui — ver observação no
      model `silver_bomb` sobre o evento `defuse` existir nos dados, mas
      essa atribuição ainda não foi implementada nesta tabela.
    columns:
      - name: match_id
        description: "{{ doc('col_match_id') }}"
        tests:
          - not_null
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
        tests:
          - not_null
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: plants
        description: "Quantidade de plants feitos pelo jogador na partida."
      - name: _camada
        description: "{{ doc('col_camada') }}"
      - name: _gerado_em
        description: "{{ doc('col_gerado_em') }}"

  - name: ranking_kills
    description: "View de ranking: kills totais por jogador, somando todas as partidas já carregadas."
    columns:
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: kills_totais
        description: "Soma de `kills` do jogador em todas as partidas carregadas."

  - name: ranking_team_kills
    description: >
      View de ranking: total de fogo amigo (team-kills) por jogador, somando
      todas as partidas já carregadas. Só lista jogadores com pelo menos 1
      team-kill (`HAVING SUM(team_kills) > 0`) — diferente das outras views
      de ranking, que listam todo mundo mesmo com valor zero.
    columns:
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: team_kills_totais
        description: "Soma de `team_kills` do jogador em todas as partidas carregadas."

  - name: ranking_kills_por_fase
    description: "View de ranking: kills totais por jogador, agrupados por evento + fase (ex.: semi-final vs final)."
    columns:
      - name: evento
        description: "{{ doc('col_evento') }}"
      - name: fase
        description: "{{ doc('col_fase') }}"
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: kills_totais
        description: "Soma de `kills` do jogador nessa fase desse evento."

  - name: ranking_kills_por_evento
    description: "View de ranking: kills totais por jogador, agrupados por evento (soma todas as fases do campeonato)."
    columns:
      - name: evento
        description: "{{ doc('col_evento') }}"
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: kills_totais
        description: "Soma de `kills` do jogador nesse evento (todas as fases)."

  - name: ranking_kills_por_mapa
    description: "View de ranking: kills totais por jogador, agrupados por mapa (cruza evento/fase — soma todas as vezes que o jogador jogou aquele mapa)."
    columns:
      - name: mapa
        description: "{{ doc('col_mapa') }}"
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: kills_totais
        description: "Soma de `kills` do jogador nesse mapa, em qualquer campeonato/fase."

  - name: ranking_granadas
    description: "View de ranking: granadas totais lançadas por jogador (todas as categorias somadas), em todas as partidas já carregadas."
    columns:
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: granadas_totais
        description: "Soma de `granadas_lancadas` do jogador (todas as categorias) em todas as partidas carregadas."

  - name: ranking_granadas_por_fase
    description: "View de ranking: granadas totais por jogador, agrupadas por evento + fase."
    columns:
      - name: evento
        description: "{{ doc('col_evento') }}"
      - name: fase
        description: "{{ doc('col_fase') }}"
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: granadas_totais
        description: "Soma de `granadas_lancadas` do jogador nessa fase desse evento."

  - name: ranking_granadas_por_evento
    description: "View de ranking: granadas totais por jogador, agrupadas por evento (soma todas as fases)."
    columns:
      - name: evento
        description: "{{ doc('col_evento') }}"
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: granadas_totais
        description: "Soma de `granadas_lancadas` do jogador nesse evento (todas as fases)."

  - name: ranking_granadas_por_mapa
    description: "View de ranking: granadas totais por jogador, agrupadas por mapa."
    columns:
      - name: mapa
        description: "{{ doc('col_mapa') }}"
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: granadas_totais
        description: "Soma de `granadas_lancadas` do jogador nesse mapa, em qualquer campeonato/fase."

  - name: ranking_tempo_por_local
    description: "View de ranking: segundos totais por jogador × local (callout), em todas as partidas já carregadas."
    columns:
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: place
        description: "{{ doc('col_participante_place') }}"
      - name: segundos_totais
        description: "Soma de `segundos_no_local` do jogador nesse local, em todas as partidas carregadas."

  - name: ranking_tempo_por_local_por_fase
    description: "View de ranking: segundos totais por jogador × local, agrupados por evento + fase."
    columns:
      - name: evento
        description: "{{ doc('col_evento') }}"
      - name: fase
        description: "{{ doc('col_fase') }}"
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: place
        description: "{{ doc('col_participante_place') }}"
      - name: segundos_totais
        description: "Soma de `segundos_no_local` do jogador nesse local, nessa fase desse evento."

  - name: ranking_tempo_por_local_por_evento
    description: "View de ranking: segundos totais por jogador × local, agrupados por evento (soma todas as fases)."
    columns:
      - name: evento
        description: "{{ doc('col_evento') }}"
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: place
        description: "{{ doc('col_participante_place') }}"
      - name: segundos_totais
        description: "Soma de `segundos_no_local` do jogador nesse local, nesse evento (todas as fases)."

  - name: ranking_tempo_por_local_por_mapa
    description: >
      View de ranking: segundos totais por jogador × local, agrupados por
      mapa (necessário porque o mesmo nome de callout, ex. `BombsiteA`,
      existe em mapas diferentes e são lugares físicos distintos).
    columns:
      - name: mapa
        description: "{{ doc('col_mapa') }}"
      - name: steamid
        description: "{{ doc('col_gold_steamid') }}"
      - name: nome
        description: "{{ doc('col_gold_nome') }}"
      - name: place
        description: "{{ doc('col_participante_place') }}"
      - name: segundos_totais
        description: "Soma de `segundos_no_local` do jogador nesse local desse mapa, em qualquer campeonato/fase."
