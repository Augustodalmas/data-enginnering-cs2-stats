events {}

http {
    # 127.0.0.11 é o DNS interno do Docker. valid=10s: re-resolve "api" no
    # máximo a cada 10s em vez de só na inicialização -- um upstream {}
    # estático (server api1:8000; ...) não re-resolve nunca, e toda vez que
    # uma réplica é recriada (rebuild/restart) ela ganha IP novo, deixando o
    # nginx com "connect() failed (Connection refused)" pro IP antigo até
    # ser reiniciado manualmente (reproduzido na prática). Com resolver +
    # variável, isso se resolve sozinho no máximo em 10s.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        # Uploads de demo (.dem/.zip) podem ser bem maiores que o limite
        # padrão do Nginx (1M) — algumas demos passam de 300-400MB cada.
        client_max_body_size 2G;

        location / {
            # "api" é o nome do serviço no docker-compose.yml, escalado com
            # --scale api=3 -- o DNS interno do Docker devolve os IPs de
            # todas as réplicas vivas desse serviço, e o nginx roda em
            # round-robin entre eles a cada resolução.
            set $upstream_api api:8000;
            proxy_pass http://$upstream_api;
            # $http_host (não $host) preserva a porta original da request do
            # cliente (ex.: "localhost:8080") -- $host sozinho a descarta,
            # o que quebrava os links next/previous da paginação.
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
